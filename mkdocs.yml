site_name: XO Universe
site_description: XO Trust Continuum Documentation
site_url: https://docs.xo.center

docs_dir: docs

repo_name: xo-ecosystem/xo-universe-docs
repo_url: https://github.com/xo-ecosystem/xo-universe-docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - mermaid2
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Overview: index.md
  - What is XO: what-is-xo.md
  - XO Universe Map: xo-universe-map.md
  - Domain Constellation: domain-constellation.md
  - Architecture: architecture.md
  - Seven Pillars: seven-pillars.md
  - System State: system-state.md
  - Activation Plan: activation-plan.md