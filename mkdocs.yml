site_name: XO Universe
site_description: XO Trust Continuum Documentation
site_url: https://docs.xo.center

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - toc.integrate
    - content.tabs.link
    - navigation.top

plugins:
  - search
  - mermaid2
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

docs_dir: docs
strict: true

nav:
  - Home: index.md
  - What Is XO: what-is-xo.md
  - XO Universe Map: xo-universe-map.md
  - Domain Constellation: domain-constellation.md
  - Architecture: architecture.md
  - Seven Pillars: seven-pillars.md
  - System State: system-state.md
  - Activation Plan: activation-plan.md

nav:
  - Drops:
      - Message Bottle: docs/drops/message-bottle.md