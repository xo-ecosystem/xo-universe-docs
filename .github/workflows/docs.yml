name: docs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin mkdocs-glightbox pymdown-extensions pyyaml
      - run: python -c "import yaml; yaml.safe_load(open('mkdocs.yml'))"
      - run: mkdocs build --strict
